spring.application.name=api-gateway
server.port=8080
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}

spring.cloud.gateway.routes[0].id=clientes-service
spring.cloud.gateway.routes[0].uri=lb://clientes-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v6/clientes/**
springdoc.swagger-ui.urls[0].name=clientes-service
springdoc.swagger-ui.urls[0].url=/clientes-service/v3/api-docs

spring.cloud.gateway.routes[1].id=vehiculos-service
spring.cloud.gateway.routes[1].uri=lb://vehiculos-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v6/vehiculos/**
springdoc.swagger-ui.urls[1].name=pagos-service
springdoc.swagger-ui.urls[1].url=/pagos-service/v3/api-docs

spring.cloud.gateway.routes[2].id=sucursales-service
spring.cloud.gateway.routes[2].uri=lb://sucursales-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v6/sucursales/**

spring.cloud.gateway.routes[3].id=vendedores-service
spring.cloud.gateway.routes[3].uri=lb://vendedores-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v6/vendedores/**

spring.cloud.gateway.routes[4].id=pagos-service
spring.cloud.gateway.routes[4].uri=lb://pagos-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v6/pagos/**

spring.cloud.gateway.routes[5].id=financiamiento-service
spring.cloud.gateway.routes[5].uri=lb://financiamiento-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/v6/financiamiento/**

spring.cloud.gateway.routes[6].id=pedidos-service
spring.cloud.gateway.routes[6].uri=lb://pedidos-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/v6/pedidos/**

spring.cloud.gateway.routes[7].id=inventario-service
spring.cloud.gateway.routes[7].uri=lb://inventario-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/api/v6/inventario/**

spring.cloud.gateway.routes[8].id=servicios-service
spring.cloud.gateway.routes[8].uri=lb://servicios-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/api/v6/servicios/**

spring.cloud.gateway.routes[9].id=facturas-service
spring.cloud.gateway.routes[9].uri=lb://facturas-service
spring.cloud.gateway.routes[9].predicates[0]=Path=/api/v6/facturas/**

spring.cloud.gateway.routes[10].id=clientes-service-swagger
spring.cloud.gateway.routes[10].uri=lb://clientes-service
spring.cloud.gateway.routes[10].predicates[0]=Path=/clientes-service/v3/api-docs/**,/clientes-service/v3/api-docs
spring.cloud.gateway.routes[10].filters[0]=RewritePath=/clientes-service/v3/api-docs/(?<segment>.*), /v3/api-docs/${segment}

spring.cloud.gateway.routes[11].id=pagos-service-swagger
spring.cloud.gateway.routes[11].uri=lb://pagos-service
spring.cloud.gateway.routes[11].predicates[0]=Path=/pagos-service/v3/api-docs/**,/clientes-service/v3/api-docs
spring.cloud.gateway.routes[11].filters[0]=RewritePath=/pagos-service/v3/api-docs/(?<segment>.*), /v3/api-docs/${segment}


spring.cloud.gateway.routes[12].id=clientes-service-swagger-ui
spring.cloud.gateway.routes[12].uri=lb://clientes-service
spring.cloud.gateway.routes[12].predicates[0]=Path=/clientes-service/swagger-ui/**
spring.cloud.gateway.routes[12].filters[0]=RewritePath=/clientes-service/swagger-ui/(?<segment>.*), /swagger-ui/${segment}

spring.cloud.gateway.routes[13].id=pagos-service-swagger-ui
spring.cloud.gateway.routes[13].uri=lb://pagos-service
spring.cloud.gateway.routes[13].predicates[0]=Path=/pagos-service/swagger-ui/**
spring.cloud.gateway.routes[13].filters[0]=RewritePath=/pagos-service/swagger-ui/(?<segment>.*), /swagger-ui/${segment}
management.endpoints.web.exposure.include=gateway