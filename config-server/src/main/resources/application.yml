spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          search-locations:
            - classpath:/configs/
            - file:./src/main/resources/configs/
            - file:./config-server/src/main/resources/configs/

server:
  port: ${CONFIG_SERVER_PORT:8888}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}